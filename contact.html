<style>

/* ===== IOS 26 LIQUID GLASS ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    font-family:-apple-system,BlinkMacSystemFont,
    "SF Pro Display","Poppins",sans-serif;

    background:
    radial-gradient(circle at top left,
    #6f4e37 0%,
    transparent 25%),

    radial-gradient(circle at bottom right,
    #2d1b14 0%,
    transparent 30%),

    linear-gradient(
    160deg,
    #0f0f10,
    #161617,
    #1f2023
    );

    color:white;
}

/* ===== WRAPPER ===== */

.ios26-wrapper{
    position:relative;
    width:100%;
    max-width:520px;
    padding:24px;
}

/* ===== FLOATING LIGHT BLOBS ===== */

.ambient{
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
    opacity:.45;
    z-index:0;
}

.ambient-1{
    width:240px;
    height:240px;
    background:#ffb37a;

    top:-80px;
    left:-100px;
}

.ambient-2{
    width:220px;
    height:220px;
    background:#8b5e3c;

    right:-90px;
    bottom:-90px;
}

/* ===== MAIN GLASS ===== */

.ios26-card{

    position:relative;
    z-index:2;

    padding:34px;

    border-radius:38px;

    overflow:hidden;

    /* IOS LIQUID GLASS */
    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,0.16),
        rgba(255,255,255,0.03)
    );

    backdrop-filter:
    blur(32px)
    saturate(180%)
    brightness(1.15);

    -webkit-backdrop-filter:
    blur(32px)
    saturate(180%)
    brightness(1.15);

    border:
    1px solid rgba(255,255,255,0.14);

    box-shadow:
    0 10px 30px rgba(0,0,0,.35),

    inset 0 1px 0 rgba(255,255,255,.22),

    inset 0 -1px 0 rgba(255,255,255,.04),

    inset 0 0 18px rgba(255,255,255,.03);

    transition:.4s ease;
}

/* ===== REAL IOS DEPTH ===== */

.ios26-card::before{
    content:'';

    position:absolute;
    inset:0;

    border-radius:38px;

    padding:1px;

    background:
    linear-gradient(
    180deg,
    rgba(255,255,255,.35),
    rgba(255,255,255,.02)
    );

    -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;
            mask-composite:exclude;

    pointer-events:none;
}

/* ===== SPECULAR LIGHT ===== */

.specular{
    position:absolute;

    top:-120px;
    left:-40px;

    width:180%;
    height:220px;

    background:
    linear-gradient(
    to bottom,
    rgba(255,255,255,.35),
    rgba(255,255,255,.06),
    transparent
    );

    transform:rotate(-8deg);

    opacity:.9;

    pointer-events:none;
}

/* ===== MICRO NOISE ===== */

.noise{
    position:absolute;
    inset:0;

    opacity:.035;

    background-image:
    radial-gradient(#fff 0.5px, transparent 0.5px);

    background-size:4px 4px;

    mix-blend-mode:overlay;

    pointer-events:none;
}

/* ===== TITLE ===== */

h3{
    font-size:30px;
    font-weight:700;

    margin-bottom:28px;

    letter-spacing:-0.5px;

    color:rgba(255,255,255,.96);

    text-shadow:
    0 2px 12px rgba(255,255,255,.08);
}

/* ===== ROWS ===== */

.row{
    display:flex;
    gap:16px;

    margin-bottom:22px;

    align-items:flex-start;
}

.row span{
    font-size:20px;
    opacity:.9;
}

.row p{
    color:rgba(255,255,255,.88);

    line-height:1.6;

    font-size:15px;
}

.title{
    font-weight:600;
    color:white;
}

/* ===== IOS 26 BUTTONS ===== */

.socials{
    display:flex;
    gap:12px;

    margin-top:30px;

    flex-wrap:wrap;
}

.socials a{

    text-decoration:none;

    color:white;

    font-size:14px;
    font-weight:500;

    padding:12px 20px;

    border-radius:999px;

    background:
    linear-gradient(
    180deg,
    rgba(255,255,255,.18),
    rgba(255,255,255,.06)
    );

    border:
    1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(18px);

    -webkit-backdrop-filter:blur(18px);

    box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    0 4px 12px rgba(0,0,0,.18);

    transition:.25s ease;
}

/* IOS HOVER */

.socials a:hover{

    transform:
    translateY(-2px)
    scale(1.02);

    background:
    linear-gradient(
    180deg,
    rgba(255,255,255,.24),
    rgba(255,255,255,.1)
    );
}

/* ===== FLOATING MOTION ===== */

@keyframes liquid{
    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-6px);
    }

    100%{
        transform:translateY(0px);
    }
}

.ios26-card{
    animation:liquid 7s ease-in-out infinite;
}

/* ===== MOBILE ===== */

@media(max-width:600px){

    .ios26-card{
        padding:28px;
        border-radius:30px;
    }

    h3{
        font-size:24px;
    }

}

</style>
